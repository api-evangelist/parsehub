          in: path
          type: string
          required: true
        - name: api_key
          in: query
          type: string
          required: true
      - name: deleterun
        method: DELETE
        description: Delete a run
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: run_token
          in: path
          type: string
          required: true
        - name: api_key
          in: query
          type: string
          required: true
    - name: runs-run_token-cancel
      path: /runs/{run_token}/cancel
      operations:
      - name: cancelrun
        method: POST
        description: Cancel a run
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: run_token
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
