naftiko: 1.0.0-alpha2
info:
  label: ParseHub API
  description: 'ParseHub API. 8 operations. Lead operation: List projects. Self-contained Naftiko capability covering one
    Parsehub business surface.'
  tags:
  - Parsehub
  - ParseHub API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PARSEHUB_API_KEY: PARSEHUB_API_KEY
capability:
