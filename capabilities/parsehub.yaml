    namespace: parsehub
    baseUri: https://www.parsehub.com/api/v2
    description: ParseHub API business capability. Self-contained, no shared references.
    resources:
    - name: projects
      path: /projects
      operations:
      - name: listprojects
        method: GET
        description: List projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: api_key
          in: query
          type: string
          required: true
        - name: offset
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
        - name: include_options
          in: query
          type: integer
    - name: projects-project_token
      path: /projects/{project_token}
      operations:
      - name: getproject
        method: GET
        description: Get a project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project_token
          in: path
          type: string
          required: true
        - name: api_key
          in: query
          type: string
          required: true
        - name: offset
