      description: REST surface for runs-run_token.
      operations:
      - method: GET
        name: getrun
        description: Get a run
        call: parsehub.getrun
        with:
          run_token: rest.run_token
          api_key: rest.api_key
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleterun
        description: Delete a run
        call: parsehub.deleterun
        with:
          run_token: rest.run_token
          api_key: rest.api_key
        outputParameters:
        - type: object
