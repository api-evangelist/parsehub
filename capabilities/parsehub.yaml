        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project_token
          in: path
          type: string
          required: true
        - name: api_key
          in: query
          type: string
          required: true
        - name: format
          in: query
          type: string
    - name: projects-project_token-run
      path: /projects/{project_token}/run
      operations:
      - name: startrun
        method: POST
        description: Start a run
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project_token
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: runs-run_token
      path: /runs/{run_token}
      operations:
      - name: getrun
        method: GET
        description: Get a run
        outputRawFormat: json
        outputParameters:
        - name: result
