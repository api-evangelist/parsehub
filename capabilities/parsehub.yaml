      name: projects
      description: REST surface for projects.
      operations:
      - method: GET
        name: listprojects
        description: List projects
        call: parsehub.listprojects
        with:
          api_key: rest.api_key
          offset: rest.offset
          limit: rest.limit
          include_options: rest.include_options
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{project-token}
      name: projects-project-token
      description: REST surface for projects-project_token.
      operations:
      - method: GET
        name: getproject
        description: Get a project
        call: parsehub.getproject
        with:
          project_token: rest.project_token
